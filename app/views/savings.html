{% extends "./layout.html" %} {% block title %}Employee Savings{% endblock %} {% block content %}
<div class="row">
    <div class="col-lg-12">
        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th class="col-md-1">Employee ID</th>
                        <th class="col-md-2">First Name</th>
                        <th class="col-md-2">Last Name</th>
                        <th class="col-md-7">Total Retirement Savings</th>
                    </tr>
                </thead>
                <tbody>

                    {% for user in users %}

                    <tr>
                        <td>{{user._id.toString()}}</td>
                        <td>{{user.firstName}}</td>
                        <td>{{user.lastName}}</td>
                        <td>
                            <form method="POST" action="/savings">
                                <div class="input-group">
                                    <input type="hidden" name="userId" value="{{user._id.toString()}}"></input>
                                    <input type="date" class="form-control" name="totalSavings" value="{{user.totalSavings}}"></input>
                                    <span class="input-group-btn">
                                        <button type="submit" class="btn btn-default">Save</button>
                                    </span>
                                </div>
                                <!-- /input-group -->
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
        <!-- /.row -->
    </div>
</div>

{% endblock %}
